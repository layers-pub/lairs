# Vendoring manifest for the Layers lexicon tree.
#
# This file records the provenance of the vendored `pub/layers/**` lexicon JSON
# so a regeneration is reproducible and auditable. It is rewritten by
# `lairs vendor --layers-ref <git-sha|tag>`. The values below are placeholders
# for the empty scaffold; they are populated when the lexicons are vendored.
#
# The runtime representation of this manifest is a didactic model; this TOML
# file is its serialised, reviewable form.

[provenance]
layers_git_sha = ""
layers_version = ""
vendored_at = ""
lexicon_tree_hash = ""

[counts]
lexicon_files = 0
record_types = 0
