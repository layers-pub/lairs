name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff format check
        run: uv run ruff format --check lairs tests

      - name: Ruff lint
        run: uv run ruff check lairs tests

      - name: Type check (ty)
        run: uvx ty check --python .venv --error-on-warning

      - name: Pytest
        run: uv run pytest

      - name: Forbid Any and bare object in annotations
        run: |
          set -euo pipefail
          # fail if Any or a bare object appears in a type-annotation position
          # anywhere under lairs/ or tests/. docstring and string prose use no
          # such punctuation, so they do not match.
          gate='(->|:|\[|\||,)[[:space:]]*(Any|object)\b|\b(Any|object)[[:space:]]*(\]|\||,|:)|[[:space:]]import[[:space:]].*\bAny\b|\btype\[object\]'
          if grep -rnE "$gate" lairs tests --include='*.py' | grep -v __pycache__; then
            echo "::error::found Any or bare object in a type annotation"
            exit 1
          fi
          echo "no Any or bare object in annotations"

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --frozen

      # the pds_server fixture starts a local PDS via docker compose (docker is
      # preinstalled on the runner) and skips cleanly if it cannot. integration
      # tests needing optional extras or external network skip cleanly too.
      - name: Integration tests (local PDS in Docker)
        run: uv run pytest --run-integration -m integration
