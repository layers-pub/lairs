name: Release

# tags shaped like v0.1.0 cut a release: build, validate, publish to PyPI via
# Trusted Publishing, create the GitHub release, and deploy the docs.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      skip_verify:
        description: "Fast rehearsal: skip verify (lint, types, docs, full test suite) and go straight to build then TestPyPI. Manual runs only; tag pushes always verify."
        type: boolean
        default: false

permissions:
  contents: read

env:
  UV_PYTHON: "3.14"

jobs:
  # gate the release on the same checks CI runs, so a tag can never publish a
  # red build. the full suite (including the Docker PDS integration tests) runs
  # here too.
  verify:
    name: Verify before release
    # skipped only on a manual fast rehearsal (workflow_dispatch + skip_verify);
    # every tag push always verifies.
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_verify) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python ${{ env.UV_PYTHON }}
        run: uv python install ${{ env.UV_PYTHON }}

      - name: Sync dependencies (dev + docs)
        run: uv sync --frozen --group docs

      - name: Ruff format
        run: uv run ruff format --check lairs tests

      - name: Ruff lint
        run: uv run ruff check lairs tests

      - name: Type check (ty)
        run: uv run ty check --error-on-warning

      - name: Generated-model drift gate
        run: uv run lairs gen --check

      - name: Build documentation (strict)
        run: uv run --group docs mkdocs build --strict

      - name: Pre-pull the PDS image
        run: docker compose -f tests/pds/docker-compose.yml pull

      - name: Run the full test suite
        run: uv run pytest --run-integration

  # build the sdist and wheel once and hand them to every downstream job.
  build:
    name: Build distributions
    needs: verify
    # run when verify passed, or when it was intentionally skipped (fast
    # rehearsal); never when verify failed or the run was cancelled.
    if: ${{ !cancelled() && (needs.verify.result == 'success' || needs.verify.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python ${{ env.UV_PYTHON }}
        run: uv python install ${{ env.UV_PYTHON }}

      - name: Build sdist and wheel
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Confirm the built version matches the tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          built=$(ls dist/lairs-*.tar.gz | sed -E 's#.*/lairs-(.*)\.tar\.gz#\1#')
          if [ "$tag_version" != "$built" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match built version $built"
            exit 1
          fi
          echo "tag and built version agree: $built"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # rehearse the publish against TestPyPI before the real upload, and as a gate
  # for it (the pypi job needs this one). it also runs on its own from the
  # Actions tab (workflow_dispatch), so the whole build-and-publish path can be
  # rehearsed without cutting a tag. `skip-existing` keeps a repeat rehearsal of
  # an already-uploaded version green. uses Trusted Publishing against TestPyPI:
  # configure a separate pending publisher at test.pypi.org with environment
  # `testpypi`.
  testpypi:
    name: Publish to TestPyPI (rehearsal)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/lairs/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # publish to PyPI with Trusted Publishing (OIDC): no token is stored. the
  # `pypi` environment scopes the trusted publisher and gates the step on any
  # protection rules you add to it. gated behind a green TestPyPI rehearsal.
  pypi:
    name: Publish to PyPI
    needs: [build, testpypi]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/lairs/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  # create the GitHub release from the tag, with the changelog section as notes
  # and the built artifacts attached.
  github-release:
    name: GitHub release
    needs: [build, pypi]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract the changelog section for this tag
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { flag = 1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See [CHANGELOG.md](CHANGELOG.md)." > release-notes.md
          fi

      - name: Create the release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*
          fail_on_unmatched_files: true

  # documentation is built and deployed to GitHub Pages by the dedicated Docs
  # workflow (.github/workflows/docs.yml) on every push to main. the release
  # commit (version bump and changelog) lands on main before the tag, so the
  # published site at https://layers.pub/lairs/ is already current by release
  # time. nothing to deploy here.
